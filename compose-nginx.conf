# Nginx config for umbrella compose (studio/compose.yaml).
# Routes /api/{service}/ to each API container; serves SPA for everything else.
# Mounted as: volumes: [./compose-nginx.conf:/etc/nginx/conf.d/default.conf:ro]

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/courses/* → courses service
    location /api/courses/ {
        proxy_pass         http://courses:5001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /api/playlists/* → playlists service
    location /api/playlists/ {
        proxy_pass         http://playlists:5002/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /api/videos/* → videos service
    location /api/videos/ {
        proxy_pass         http://videos:5003/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all other requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
